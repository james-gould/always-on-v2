name: AKS Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
  push:
    branches: [main]
    paths:
      - src/**
      - dev/**
      - infra/**
      - scripts/**
      - .github/workflows/bicep-up.yml
  pull_request:
    paths:
      - src/**
      - dev/**
      - infra/**
      - scripts/**
      - .github/workflows/bicep-up.yml

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  TARGET_ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  build-and-publish-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore and build
        run: dotnet build ./AlwaysOn.slnx -v minimal

      - name: Install Aspire CLI
        shell: pwsh
        run: |
          Invoke-RestMethod https://aspire.dev/install.ps1 | Invoke-Expression
          "$HOME/.aspire/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          aspire --version

      - name: Publish Kubernetes manifests
        shell: pwsh
        run: ./scripts/Deploy-AppHost.ps1 -PublishOnly -OutputPath ./artifacts/aspire

      - name: Upload manifests artifact
        uses: actions/upload-artifact@v4
        with:
          name: aspire-manifests-${{ env.TARGET_ENVIRONMENT }}
          path: artifacts/aspire
          if-no-files-found: error

  validate-infra:
    runs-on: ubuntu-latest
    needs: build-and-publish-manifests
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          RG_NAME="rg-alwayson-${TARGET_ENVIRONMENT}"
          if [ "$(az group exists --name "$RG_NAME")" != "true" ]; then
            az group create --name "$RG_NAME" --location uksouth --output none
          fi

      - name: Bicep what-if
        run: |
          RG_NAME="rg-alwayson-${TARGET_ENVIRONMENT}"
          az deployment group what-if \
            --resource-group "$RG_NAME" \
            --template-file infra/main.bicep \
            --parameters "@infra/main.bicepparam.${TARGET_ENVIRONMENT}.json" \
            --parameters keyVaultAdminObjectId="${{ secrets.KEYVAULT_ADMIN_OBJECT_ID }}"

  deploy-infra-and-workloads:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate-infra
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download manifests artifact
        uses: actions/download-artifact@v4
        with:
          name: aspire-manifests-${{ env.TARGET_ENVIRONMENT }}
          path: artifacts/aspire

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        run: |
          RG_NAME="rg-alwayson-${TARGET_ENVIRONMENT}"
          if [ "$(az group exists --name "$RG_NAME")" != "true" ]; then
            az group create --name "$RG_NAME" --location uksouth --output none
          fi

          az deployment group create \
            --resource-group "$RG_NAME" \
            --template-file infra/main.bicep \
            --parameters "@infra/main.bicepparam.${TARGET_ENVIRONMENT}.json" \
            --parameters keyVaultAdminObjectId="${{ secrets.KEYVAULT_ADMIN_OBJECT_ID }}" \
            --output table

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: rg-alwayson-${{ env.TARGET_ENVIRONMENT }}
          cluster-name: alwayson-${{ env.TARGET_ENVIRONMENT }}-aks

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Apply published manifests
        shell: bash
        run: |
          set -euo pipefail
          files=$(find artifacts/aspire -type f \( -name '*.yaml' -o -name '*.yml' \))
          if [ -z "$files" ]; then
            echo "No Kubernetes manifests found under artifacts/aspire"
            exit 1
          fi

          while IFS= read -r file; do
            echo "Applying $file"
            kubectl apply -f "$file"
          done <<< "$files"