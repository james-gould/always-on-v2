name: AKS Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
  push:
    branches: [main]
    paths:
      - src/**
      - dev/**
      - infra/**
      - scripts/**
      - k8s/**
      - .github/workflows/bicep-up.yml
  pull_request:
    paths:
      - src/**
      - dev/**
      - infra/**
      - scripts/**
      - k8s/**
      - .github/workflows/bicep-up.yml

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  TARGET_ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore and build
        run: dotnet build ./AlwaysOn.slnx -v minimal

  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          RG_NAME="rg-alwayson-${TARGET_ENVIRONMENT}"
          if [ "$(az group exists --name "$RG_NAME")" != "true" ]; then
            az group create --name "$RG_NAME" --location westeurope --output none
          fi

      - name: Bicep what-if
        run: |
          RG_NAME="rg-alwayson-${TARGET_ENVIRONMENT}"
          az deployment group what-if \
            --resource-group "$RG_NAME" \
            --template-file infra/main.bicep \
            --parameters "@infra/main.bicepparam.${TARGET_ENVIRONMENT}.json" \
            --parameters keyVaultAdminObjectId="${{ secrets.KEYVAULT_ADMIN_OBJECT_ID }}"

  deploy:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build-and-validate, validate-infra]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Aspire CLI
        shell: bash
        run: |
          curl -fsSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"
          aspire --version

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        run: |
          RG_NAME="rg-alwayson-${TARGET_ENVIRONMENT}"
          if [ "$(az group exists --name "$RG_NAME")" != "true" ]; then
            az group create --name "$RG_NAME" --location westeurope --output none
          fi

          az deployment group create \
            --resource-group "$RG_NAME" \
            --template-file infra/main.bicep \
            --parameters "@infra/main.bicepparam.${TARGET_ENVIRONMENT}.json" \
            --parameters keyVaultAdminObjectId="${{ secrets.KEYVAULT_ADMIN_OBJECT_ID }}" \
            --output table

      - name: Deploy workloads
        shell: pwsh
        run: |
          ./scripts/Deploy-AppHost.ps1 `
            -Environment $env:TARGET_ENVIRONMENT `
            -ImageTag ${{ github.sha }}