name: AKS Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
  push:
    branches: [master]
    paths:
      - src/**
      - dev/**
      - infra/**
      - scripts/**
      - k8s/**
      - .github/workflows/bicep-up.yml
  pull_request:
    paths:
      - src/**
      - dev/**
      - infra/**
      - scripts/**
      - k8s/**
      - .github/workflows/bicep-up.yml

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  TARGET_ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  LOCATION: westeurope

jobs:
  # ── Job 1: Build & validate ────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build solution
        run: dotnet build ./AlwaysOn.slnx -v minimal

  # ── Job 2: Validate infra (what-if) ────────────────────────
  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: |
          RG="rg-alwayson-${TARGET_ENVIRONMENT}"
          [ "$(az group exists --name "$RG")" = "true" ] || \
            az group create --name "$RG" --location "$LOCATION" -o none

      - name: Bicep what-if
        run: |
          az deployment group what-if \
            --resource-group "rg-alwayson-${TARGET_ENVIRONMENT}" \
            --template-file infra/main.bicep \
            --parameters "@infra/main.bicepparam.${TARGET_ENVIRONMENT}.json"

  # ── Job 3: Deploy infra ────────────────────────────────────
  deploy-infra:
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build, validate-infra]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      acr-login-server: ${{ steps.bicep.outputs.acrLoginServer }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: |
          RG="rg-alwayson-${TARGET_ENVIRONMENT}"
          [ "$(az group exists --name "$RG")" = "true" ] || \
            az group create --name "$RG" --location "$LOCATION" -o none

      - name: Deploy Bicep
        id: bicep
        timeout-minutes: 15
        run: |
          RG="rg-alwayson-${TARGET_ENVIRONMENT}"
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/main.bicep \
            --parameters "@infra/main.bicepparam.${TARGET_ENVIRONMENT}.json" \
            --name main \
            --output table

          RESULT=$(az deployment group show \
            --resource-group "$RG" \
            --name main \
            --query "properties.outputs" -o json)

          echo "acrLoginServer=$(echo "$RESULT" | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "$RESULT" | jq .

  # ── Job 4: Deploy workloads ────────────────────────────────
  deploy-app:
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [deploy-infra]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Aspire CLI
        run: |
          curl -fsSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy workloads
        shell: pwsh
        run: |
          ./scripts/Deploy-AppHost.ps1 `
            -Environment $env:TARGET_ENVIRONMENT `
            -ImageTag ${{ github.sha }}