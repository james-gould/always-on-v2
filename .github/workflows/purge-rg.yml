name: Purge Resource Group

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment whose resource group should be purged
        required: true
        default: dev
        type: choice
        options:
          - dev
      confirm:
        description: Type the resource group name (e.g. rg-alwayson-dev) to confirm deletion
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Validate confirmation
        run: |
          RG="rg-alwayson-${{ github.event.inputs.environment }}"
          if [ "${{ github.event.inputs.confirm }}" != "$RG" ]; then
            echo "Confirmation value '${{ github.event.inputs.confirm }}' does not match resource group '$RG'."
            exit 1
          fi
          echo "Confirmed purge of resource group: $RG"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete resource group
        run: |
          RG="rg-alwayson-${{ github.event.inputs.environment }}"
          if [ "$(az group exists --name "$RG")" = "true" ]; then
            echo "Deleting resource group '$RG'..."
            az group delete --name "$RG" --yes
            echo "Deleted resource group '$RG'."
          else
            echo "Resource group '$RG' does not exist; nothing to purge."
          fi
