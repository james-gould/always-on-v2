name: Infrastructure

on:
  push:
    branches: [main]
    paths: [infra/**]
  pull_request:
    paths: [infra/**]

permissions:
  id-token: write   # needed for OIDC federated credential
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: |
          az deployment group what-if \
            --resource-group rg-alwayson-dev \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam.json

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: dev          # requires manual approval if configured
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: |
          az deployment group create \
            --resource-group rg-alwayson-dev \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam.json