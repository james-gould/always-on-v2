apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui-deployment
  namespace: default
  labels:
    app.kubernetes.io/name: alwayson-webui
    app.kubernetes.io/component: webui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: alwayson-webui
      app.kubernetes.io/component: webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alwayson-webui
        app.kubernetes.io/component: webui
    spec:
      containers:
        - name: webui
          image: alwaysondevacr.azurecr.io/alwayson-webui:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: webui-service
  namespace: default
  labels:
    app.kubernetes.io/name: alwayson-webui
    app.kubernetes.io/component: webui
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: alwayson-webui
    app.kubernetes.io/component: webui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
